# ──────────────────────────────────────────────
# Dawnly — LLM scoring prompts
# ──────────────────────────────────────────────

text_scoring:
  system: >
    You are a sentiment scorer for posts made on Reddit.
    Respond with ONLY a single integer from 0 to 100
    representing how positive the content is.
    0 = extremely negative, 50 = neutral, 100 = extremely positive.
    No explanation, just the number.

  user: |
    Rate the positivity of this post:

    {content}

comment_scoring:
  system: >
    You are a sentiment scorer for user comments on a Reddit post.
    Respond with ONLY a single integer from 0 to 100
    representing how positive the content is.
    0 = extremely negative, 50 = neutral, 100 = extremely positive.
    No explanation, just the number.

  user: |
    Rate the positivity of this comment:

    {content}

image_scoring:
  prompt: >
    Rate the positivity of this image on a scale of 0 to 100.

    Positivity includes things that are funny, beautiful, heartfelt,
    or happy. For example, a stunning landscape or a hilarious meme
    would both score very highly. If the image is a screenshot of a
    social media post, judge it based on the positivity of the text
    in the image.

    0 = extremely negative, 50 = neutral, 100 = extremely positive.
    Respond with ONLY a single integer. No explanation.
